<!DOCTYPE html>
<html>
<head>
  <title>My First Static Web App</title>
</head>
<body>
  <h1>AI CoE - Azure Static Web App</h1>

  <button onclick="callApi()">Call API</button>
  <pre id="out"></pre>

  <script>
    async function callApi() { 
      const res = await fetch(
        "https://speechfun-fbhjckf2dshncnay.australiaeast-01.azurewebsites.net/api/querysynapseflow",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: "SELECT TOP (10) * FROM [energex].[energex_suburb_outages_total]" })
        }
      );
      document.getElementById("out").textContent =
        JSON.stringify(await res.json(), null, 2);
    }
  </script>


</body>
</html>
